<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->

    <meta name="description" content="AID UP is an AI-powered autism developmental tracker that turns parents observations into structured insights to support therapy, behavior, and biomedical care" />
    <link rel="canonical" href="https://myaidup.com/" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/Icon-192.png" />

    <!-- Open Graph — WhatsApp, iMessage, LinkedIn, Facebook -->
    <meta property="og:title" content="AID UP — AI Autism Journal and Developmental Tracker for Parents" />
    <meta property="og:description" content="AI turns your daily observations into OT, PT, ABA, Biomedical guidance in days not months — so you can change course without constant £400 specialist follow-ups." />
    <meta property="og:image" content="https://myaidup.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AID UP — AI Autism Developmental Tracker" />
    <meta property="og:url" content="https://myaidup.com" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AID UP" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AID UP — AI Autism Journal and Developmental Tracker for Parents" />
    <meta name="twitter:description" content="AI turns your daily observations into OT, PT, ABA, Biomedical guidance in days not months." />
    <meta name="twitter:image" content="https://myaidup.com/og-image.png" />
    <meta name="twitter:image:alt" content="AID UP — AI Autism Developmental Tracker" />

    <!-- Structured Data / JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "AID UP",
      "alternateName": "AIDUP",
      "url": "https://myaidup.com",
      "description": "AID UP is an AI-powered autism developmental tracker that turns parents observations into structured insights to support therapy, behavior, and biomedical care",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "iOS, Android, Web",
      "offers": {
        "@type": "Offer",
        "price": "20.00",
        "priceCurrency": "GBP"
      },
      "audience": {
        "@type": "Audience",
        "audienceType": "Parents of children with Autism Spectrum Disorder"
      },
      "creator": {
        "@type": "Organization",
        "name": "AID UP",
        "url": "https://myaidup.com"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
